<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Visitor App</title>
<link rel="manifest" href="/smart-visitor-app/manifest.json">
</head>
<body style="text-align:center; font-family:Arial; padding:50px;">

<h2 id="welcome">👋 Welcome to Smart Visitor App</h2>

<div id="roles">
  <button onclick="showLogin('Owner')">🔑 Owner Login</button>
  <button onclick="showLogin('Guard')">🛡️ Guard Login</button>
  <button onclick="showLogin('Visitor')">👤 Visitor Form</button>
</div>

<div id="login" style="display:none;">
  <h3 id="role-title"></h3>
  <form id="form" method="POST">
    <input type="text" name="username" placeholder="Username" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>
    <button type="submit">Login / Submit</button>
  </form>
</div>

<script>
function showLogin(role) {
  document.getElementById('roles').style.display = 'none';
  document.getElementById('login').style.display = 'block';
  document.getElementById('role-title').innerText = role;
  document.title = role + " - Smart Visitor App";

  // Set form action dynamically
  const form = document.getElementById('form');
  if(role === 'Owner') form.action = 'owner/owner_login.html';
  else if(role === 'Guard') form.action = 'guard/guard_login.php';
  else form.action = 'visitor/visitor_form.php'; // Visitor form
}
</script>

</body>
</html>
